version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: probbet_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-probbet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-probbet123}
      POSTGRES_DB: ${POSTGRES_DB:-probbet_db}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - probbet_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-probbet}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: probbet_backend
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: ${POSTGRES_USER:-probbet}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-probbet123}
      DATABASE_NAME: ${POSTGRES_DB:-probbet_db}
      JWT_SECRET: ${JWT_SECRET:-probbet_jwt_secret_2024}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - probbet_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: probbet_frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - probbet_network

volumes:
  postgres_data:

networks:
  probbet_network:
    driver: bridge
